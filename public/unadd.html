<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaguya-设备未注册</title>
    <style>
        @font-face {
            font-family: 'Alibaba PuHuiTi';
            src: url('./font/AlibabaPuHuiTi-3-115-Black.woff') format('truetype');
            font-weight: 400;
            font-style: normal;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Alibaba PuHuiTi", sans-serif;
        }
        body {
            background-color: #222;
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            padding: 2cm;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
            width: 100vw;
        }
        .content {
            position: relative;
            z-index: 1;
            width: 100%;
        }
        .sad-icon {
            font-size: 128px;
            color: #ff6b6b;
            margin-bottom: 20px;
        }
        h1 {
            color: #ff6b6b;
            font-size: 64px;
            line-height: 1.4;
            margin-bottom: 20px;
        }
        .desc {
            color: #ff6b6b;
            font-size: 32px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .device-code {
            background-color: #333;
            color: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 28px;
            font-family: monospace;
            display: inline-block;
            margin-top: 10px;
            letter-spacing: 2px;
        }
        .device-label {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 8px;
        }
        .system-error {
            margin-top: 30px;
            color: #ff6b6b;
            font-size: 16px;
            font-family: monospace;
        }
        .copyright{
            color: white;
            float: right;
            text-align: right;
        }
        .copyright a{
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="sad-icon">;(</div>
        <h1>设备未注册<br>无法使用此大屏系统</h1>
        <div class="desc">
            未添加此机器，请前往管理端添加此设备。
        </div>
        <div class="device-label">设备码：</div>
        <div class="device-code" id="device-code">------</div>
        <div class="system-error">DEVICE_NOT_REGISTERED</div>
        <div class="copyright">Kaguya 由 SorasakuYu 开发<br>Copyright © 2026 <a href="https://www.sorasaku.vip/">SorasakuYu(张家赫)</a>.All rights reserved.</div>
    </div>
    <script src="js/device.js"></script>
    <script>
        document.getElementById('device-code').textContent = window.getDeviceCode();
        setTimeout(() => {
            window.location.href = 'http://localhost/';
        }, 5000);
    </script>
</body>
</html>
