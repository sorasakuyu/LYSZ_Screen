<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Kaguya-Loading</title>
	<style>
		body { margin: 0; display: grid; place-items: center; min-height: 100vh; font-family: Arial, sans-serif; color: #333; }
	</style>
	<script src="js/device.js"></script>
	<script src="js/api.js"></script>
</head>
<body>
	<p>Loading…</p>
	<script>
		(async () => {
			let redirected = false;
			const controller = new AbortController();
			const timeoutId = setTimeout(() => {
				redirected = true;
				controller.abort();
				window.location.replace('/error.html');
			}, 5000);

			try {
				const device = window.getDeviceCode();
				const checkRes = await fetch(`http://192.168.1.5:9000/device/check?device=${device}`, {
					signal: controller.signal,
					cache: 'no-store'
				});
				
				if (!checkRes.ok) throw new Error('Device check failed');
				const checkData = await checkRes.json();
				
				if (redirected) return;
				
				if (!checkData.exists) {
					clearTimeout(timeoutId);
					window.location.replace('/unadd.html');
					return;
				}

				const res = await apiGet('/config/', 5000);
				if (!res.ok) throw new Error('Failed to load config');
				const data = await res.json();
				if (redirected) return;
				clearTimeout(timeoutId);
				if (data && data.mode === 'default') {
					window.location.replace('/default.html');
				}
                else if (data && data.mode === 'video') {
					window.location.replace('/video.html');
				}
				else if (data && data.mode === 'notice') {
					window.location.replace('/notice_check.html');
				}
			} catch (err) {
				if (redirected) return;
				clearTimeout(timeoutId);
				console.error('Config fetch error:', err);
				window.location.replace('/error.html');
			}
		})();
	</script>
</body>
</html>
